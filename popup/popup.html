<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo-row">
      <div class="shield-icon" id="shieldIcon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7V12C3 17.25 6.87 22.18 12 23.5C17.13 22.18 21 17.25 21 12V7L12 2Z" fill="url(#shieldGrad)" stroke="none"/>
          <path class="shield-check" d="M9 12L11 14L15 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <defs>
            <linearGradient id="shieldGrad" x1="3" y1="2" x2="21" y2="23.5" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6C5CE7"/>
              <stop offset="1" stop-color="#FF3B5C"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="title-group">
        <h1>PopBlock</h1>
        <span class="subtitle">Popup & Redirect Blocker</span>
      </div>
    </div>
  </div>

  <!-- Main Toggle -->
  <div class="toggle-section">
    <div class="toggle-card" id="toggleCard">
      <div class="toggle-info">
        <span class="toggle-label" id="statusLabel">Protection Active</span>
        <span class="toggle-hint" id="statusHint">Blocking popups & redirects</span>
      </div>
      <label class="switch" id="mainToggle">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#FF3B5C" stroke-width="2"/>
          <line x1="8" y1="8" x2="16" y2="16" stroke="#FF3B5C" stroke-width="2" stroke-linecap="round"/>
          <line x1="16" y1="8" x2="8" y2="16" stroke="#FF3B5C" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="stat-value" id="tabBlockCount">0</div>
      <div class="stat-label">This Tab</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#6C5CE7" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="stat-value" id="totalBlockCount">0</div>
      <div class="stat-label">All Time</div>
    </div>
  </div>

  <!-- Current Site Section -->
  <div class="site-section" id="siteSection">
    <div class="site-header">
      <span class="site-label">Current Site</span>
    </div>
    <div class="site-card">
      <div class="site-info">
        <span class="site-domain" id="currentDomain">—</span>
        <span class="site-status" id="siteStatus">Protected</span>
      </div>
      <button class="whitelist-btn" id="whitelistBtn" title="Allow popups on this site">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <span id="whitelistText">Whitelist</span>
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="version">v1.0.0</span>
    <span class="divider">•</span>
    <span class="footer-text">Force-stopping the chaos</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
